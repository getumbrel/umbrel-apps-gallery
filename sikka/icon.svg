<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sikka logo</title>
  <desc id="desc">A circular Sikka coin with a flowing S path and connected nodes, rendered in a blue and teal gradient.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="72" x2="432" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08101a"/>
      <stop offset="0.55" stop-color="#11253a"/>
      <stop offset="1" stop-color="#081722"/>
    </linearGradient>
    <linearGradient id="ring" x1="118" y1="118" x2="394" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.45" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="flow" x1="180" y1="134" x2="338" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.4" stop-color="#d7f9ff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(170 140) rotate(39.4) scale(292 312)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="196" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="168" fill="#09131f" stroke="url(#ring)" stroke-width="18"/>
    <circle cx="256" cy="256" r="142" fill="none" stroke="rgba(148, 163, 184, 0.18)" stroke-width="2"/>

    <path d="M317 147c-28-18-66-24-103-11-36 12-60 42-60 73 0 28 18 46 63 62l51 18c33 11 45 22 45 42 0 19-18 35-44 42-31 9-65 1-98-23" fill="none" stroke="url(#flow)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M318 147c-27-17-62-21-95-10-38 13-57 42-57 69 0 21 13 35 54 49l50 18c39 14 54 31 54 56 0 19-10 35-29 47" fill="none" stroke="#e0f2fe" stroke-opacity="0.14" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M183 184L140 141" fill="none" stroke="#67e8f9" stroke-opacity="0.75" stroke-width="7" stroke-linecap="round"/>
    <path d="M331 328L378 375" fill="none" stroke="#67e8f9" stroke-opacity="0.75" stroke-width="7" stroke-linecap="round"/>
    <path d="M154 269H109" fill="none" stroke="#818cf8" stroke-opacity="0.7" stroke-width="7" stroke-linecap="round"/>
    <path d="M356 242H402" fill="none" stroke="#818cf8" stroke-opacity="0.7" stroke-width="7" stroke-linecap="round"/>

    <circle cx="140" cy="141" r="17" fill="#0f172a" stroke="#67e8f9" stroke-width="7"/>
    <circle cx="109" cy="269" r="15" fill="#0f172a" stroke="#818cf8" stroke-width="7"/>
    <circle cx="402" cy="242" r="15" fill="#0f172a" stroke="#818cf8" stroke-width="7"/>
    <circle cx="378" cy="375" r="17" fill="#0f172a" stroke="#67e8f9" stroke-width="7"/>
    <circle cx="256" cy="110" r="12" fill="#0f172a" stroke="#c084fc" stroke-width="6"/>
  </g>
</svg>